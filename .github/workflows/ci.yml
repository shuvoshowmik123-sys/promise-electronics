name: CI pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Drizzle Schema
      # Ensures the database types are generated before typechecking
      run: npm run db:push || true

    - name: Run ESLint
      run: npm run lint
      
    - name: Run TypeScript Compiler Check
      run: npm run check

    - name: Build Application
      run: npm run build
