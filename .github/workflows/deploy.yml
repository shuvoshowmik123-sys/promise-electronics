name: Deploy Backend to Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json"
        continue-on-error: true

      - name: Verify Health Check
        run: |
          echo "Waiting 3 minutes for Render to build and start..."
          sleep 180
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_HEALTH_URL }}/health")
          echo "Health check status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend is live and healthy"
          else
            echo "⚠️ Health check returned $STATUS — may still be starting"
          fi
        continue-on-error: true
