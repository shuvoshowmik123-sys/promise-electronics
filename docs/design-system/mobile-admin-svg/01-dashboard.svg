      .muted{fill:#64748b;font-family:Inter,Arial,sans-serif}
      .text{fill:#0f172a;font-family:Inter,Arial,sans-serif}
      .title{font-size:22px;font-weight:800}
      .h1{font-size:20px;font-weight:850}
      .h2{font-size:13px;font-weight:850;letter-spacing:.5px}
      .body{font-size:13px;font-weight:600}
      .meta{font-size:11px;font-weight:500}
      .tiny{font-size:10px;font-weight:800;letter-spacing:.4px}
      .nav{font-size:10px;font-weight:750}
      .value{font-size:20px;font-weight:900}
      .blue{fill:#2563eb}
      .blueSoft{fill:#eff6ff}
      .cyanSoft{fill:#ecfeff}
      .emerald{fill:#059669}
      .emeraldSoft{fill:#ecfdf5}
      .amber{fill:#d97706}
