      <circle cx="24" cy="22" r="7" fill="none" stroke="#64748b" stroke-width="2"/>
      <path d="M29 27 L36 34" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
      <text x="50" y="27" class="small">Search ticket, phone, TV model</text>
    </g>

    <g transform="translate(34 207)">
      <rect x="0" y="0" width="68" height="34" rx="14" fill="#dbeafe" stroke="#bfdbfe"/>
      <text x="18" y="22" class="chip" fill="#1d4ed8">New</text>
      <rect x="76" y="0" width="92" height="34" rx="14" fill="#eef2ff" stroke="#c7d2fe"/>
      <text x="94" y="22" class="chip" fill="#4338ca">Repair</text>
      <rect x="176" y="0" width="90" height="34" rx="14" fill="#fffbeb" stroke="#fde68a"/>
      <text x="193" y="22" class="chip" fill="#b45309">Parts</text>
      <rect x="274" y="0" width="78" height="34" rx="14" fill="#ecfdf5" stroke="#a7f3d0"/>
      <text x="292" y="22" class="chip" fill="#047857">Ready</text>
    </g>

    <g transform="translate(34 262)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="352" height="177" rx="20" class="white-card"/>
      <rect x="16" y="16" width="86" height="25" rx="10" fill="#dbeafe"/>
      <text x="29" y="33" class="mono">PTV-1042</text>
      <rect x="266" y="16" width="70" height="25" rx="10" fill="#dbeafe"/>
      <text x="284" y="33" class="chip" fill="#1d4ed8">NEW</text>
      <text x="16" y="65" class="tiny-label">CUSTOMER</text>
      <text x="16" y="88" class="strong">Rahman</text>
      <text x="252" y="87" class="mono-dark">01722...</text>
      <text x="16" y="113" class="tiny-label">DEVICE</text>
      <text x="16" y="136" class="body">Sony Bravia 43 inch</text>
      <text x="244" y="136" class="small">No display</text>
      <rect x="16" y="148" width="320" height="44" rx="13" fill="url(#blueButton)"/>
      <circle cx="91" cy="170" r="8" fill="#ffffff" opacity="0.92"/>
      <path d="M89 166 L96 170 L89 174 Z" fill="#2563eb"/>
      <text x="112" y="175" class="btn-text">Start Repair</text>
    </g>

    <g transform="translate(34 455)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="352" height="165" rx="20" class="white-card"/>
      <rect x="16" y="16" width="86" height="25" rx="10" fill="#eef2ff"/>
      <text x="29" y="33" class="mono" fill="#4338ca">PTV-1038</text>
      <rect x="236" y="16" width="100" height="25" rx="10" fill="#eef2ff"/>
      <text x="253" y="33" class="chip" fill="#4338ca">REPAIRING</text>
      <text x="16" y="65" class="tiny-label">CUSTOMER</text>
      <text x="16" y="88" class="strong">Farhana</text>
      <text x="16" y="113" class="tiny-label">DEVICE</text>
      <text x="16" y="136" class="body">Samsung 55 inch</text>
      <text x="230" y="136" class="small">Backlight</text>
      <rect x="16" y="148" width="320" height="44" rx="13" fill="url(#blueButton)"/>
      <path d="M84 171 L94 181 L112 158" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="124" y="175" class="btn-text">Mark Ready</text>
    </g>

    <g transform="translate(34 636)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="352" height="122" rx="20" class="white-card"/>
      <rect x="16" y="16" width="86" height="25" rx="10" fill="#fffbeb"/>
      <text x="29" y="33" class="mono" fill="#b45309">PTV-1032</text>
      <rect x="224" y="16" width="112" height="25" rx="10" fill="#fffbeb"/>
      <text x="239" y="33" class="chip" fill="#b45309">WAIT PARTS</text>
      <text x="16" y="68" class="strong">LG 32 inch</text>
      <text x="16" y="94" class="small">Power board pending</text>
      <rect x="212" y="62" width="124" height="44" rx="13" fill="#0f172a"/>
      <text x="232" y="90" class="btn-dark">Parts Arrived</text>
    </g>

    <g transform="translate(16 782)">
      <rect x="0" y="0" width="388" height="72" rx="0" fill="#ffffff" stroke="#e2e8f0"/>
      <rect x="42" y="12" width="48" height="34" rx="17" fill="#dbeafe"/>
      <circle cx="66" cy="27" r="9" fill="none" stroke="#2563eb" stroke-width="2"/>
      <path d="M58 37 H74" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
      <text x="51" y="61" class="nav-active">Jobs</text>
      <text x="126" y="61" class="nav">POS</text>
      <text x="186" y="61" class="nav">Stock</text>
      <text x="252" y="61" class="nav">Finance</text>
      <text x="333" y="61" class="nav">More</text>
    </g>
  </g>

  <!-- Phone 2: Detail sheet -->
