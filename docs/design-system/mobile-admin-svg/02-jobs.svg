      <circle cx="112" cy="31" r="10" fill="#c7d2fe" stroke="#6366f1" stroke-width="3"/>
      <circle cx="207" cy="31" r="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
      <circle cx="302" cy="31" r="10" fill="#d1fae5" stroke="#10b981" stroke-width="3"/>
