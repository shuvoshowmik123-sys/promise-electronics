    <rect x="0" y="0" width="420" height="870" rx="44" fill="#0f172a"/>
    <rect x="16" y="16" width="388" height="838" rx="34" class="phone-bg"/>
    <rect x="151" y="28" width="118" height="24" rx="12" fill="#0f172a"/>

