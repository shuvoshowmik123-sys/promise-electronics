    <rect x="0" y="0" width="420" height="870" rx="44" fill="#0f172a"/>
    <rect x="16" y="16" width="388" height="838" rx="34" class="phone-bg"/>
    <rect x="151" y="28" width="118" height="24" rx="12" fill="#0f172a"/>

    <g transform="translate(34 66)">
      <rect x="-18" y="-20" width="388" height="96" fill="#f8fafc" opacity="0.92"/>
      <text x="0" y="0" class="small">Tuesday, shop floor</text>
      <text x="0" y="33" class="top-title">Jobs</text>
      <rect x="288" y="7" width="58" height="38" rx="19" fill="#ffffff" stroke="#e2e8f0"/>
      <circle cx="314" cy="26" r="8" fill="none" stroke="#0f172a" stroke-width="2"/>
      <path d="M320 32 L328 40" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
    </g>

    <g transform="translate(34 145)">
