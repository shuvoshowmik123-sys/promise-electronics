<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Promise Admin Mobile Jobs Tab Mockup</title>
  <desc id="desc">Three mobile screens for the Jobs tab: technician job queue, job detail bottom sheet, and status action confirmation. Status colors: new blue, in progress indigo, waiting parts amber, ready emerald/cyan, delivered slate, cancelled red. Primary action is blue and full width.</desc>
  <metadata>
    {
      "project": "Promise Electronics admin mobile redesign",
      "tab": "Jobs",
      "audience": "Technician and small-shop operator",
      "principles": ["one job equals one card", "one clear action", "customer and device auto-filled", "cards are spacious", "bottom sheets for details"],
      "primaryActions": {
        "Pending or Diagnosing": "Start Repair",
        "In Progress or On Workbench": "Mark Ready",
        "Pending Parts or Waiting on Parts": "Parts Arrived",
        "Ready": "Take Payment",
        "Completed": "Print and Deliver"
      }
    }
  </metadata>
  <defs>
    <filter id="phoneShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="darkHeader" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="blueButton" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <style>
      .frame-title { font: 800 28px Inter, ui-sans-serif, system-ui, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .frame-note { font: 600 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: #64748b; letter-spacing: 0; }
      .phone-bg { fill: #f8fafc; }
      .top-title { font: 900 27px Inter, ui-sans-serif, system-ui, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .small { font: 600 12px Inter, ui-sans-serif, system-ui, sans-serif; fill: #64748b; letter-spacing: 0; }
      .tiny-label { font: 800 9px Inter, ui-sans-serif, system-ui, sans-serif; fill: #94a3b8; letter-spacing: 1.5px; }
      .body { font: 700 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: #334155; letter-spacing: 0; }
      .strong { font: 900 18px Inter, ui-sans-serif, system-ui, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .mono { font: 800 13px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill: #1d4ed8; letter-spacing: 0; }
      .mono-dark { font: 800 13px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill: #0f172a; letter-spacing: 0; }
      .btn-text { font: 900 15px Inter, ui-sans-serif, system-ui, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .btn-dark { font: 800 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .chip { font: 800 12px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 0; }
      .nav { font: 800 10px Inter, ui-sans-serif, system-ui, sans-serif; fill: #64748b; letter-spacing: 0; }
      .nav-active { font: 900 10px Inter, ui-sans-serif, system-ui, sans-serif; fill: #2563eb; letter-spacing: 0; }
      .white-card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1800" height="1200" fill="url(#pageBg)"/>
  <text x="90" y="86" class="frame-title">Jobs Tab Mobile UI: Technician Workbench</text>
  <text x="90" y="116" class="frame-note">Mobile-specific layout for shop-floor work: compact queue, bottom-sheet detail, and thumb-safe status actions.</text>

  <g transform="translate(90 165)">
    <text x="0" y="0" class="frame-title">1. Job Queue</text>
    <text x="0" y="27" class="frame-note">Glance, filter, act. The card action is the hero.</text>
  </g>
  <g transform="translate(650 165)">
    <text x="0" y="0" class="frame-title">2. Job Detail Sheet</text>
    <text x="0" y="27" class="frame-note">Bottom sheet, dark job identity, useful facts first.</text>
  </g>
  <g transform="translate(1210 165)">
    <text x="0" y="0" class="frame-title">3. Status Action</text>
    <text x="0" y="27" class="frame-note">Confirmation is simple. Optional proof stays optional.</text>
  </g>

