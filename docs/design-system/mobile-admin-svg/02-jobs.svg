      <path d="M316 18 L332 34 M332 18 L316 34" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <g transform="translate(16 163)">
      <rect x="0" y="0" width="388" height="691" rx="34" fill="#ffffff" stroke="#e2e8f0"/>
      <rect x="140" y="14" width="108" height="5" rx="3" fill="#cbd5e1"/>
      <rect x="0" y="32" width="388" height="172" rx="34" fill="url(#darkHeader)"/>
      <circle cx="327" cy="54" r="48" fill="#334155" opacity="0.34"/>
      <circle cx="353" cy="98" r="72" fill="#334155" opacity="0.18"/>
      <text x="26" y="75" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="800" fill="#94a3b8" letter-spacing="1.5">JOB TICKET</text>
      <text x="26" y="113" font-family="SFMono-Regular, Consolas, monospace" font-size="30" font-weight="900" fill="#bfdbfe">PTV-1042</text>
      <rect x="26" y="132" width="88" height="28" rx="12" fill="#1e40af" opacity="0.82"/>
      <text x="44" y="151" class="chip" fill="#bfdbfe">NEW</text>
      <rect x="124" y="132" width="74" height="28" rx="12" fill="#7f1d1d" opacity="0.36"/>
      <text x="141" y="151" class="chip" fill="#fecaca">HIGH</text>
      <text x="250" y="155" font-family="SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#cbd5e1">BDT 1,200</text>
    </g>

    <g transform="translate(42 392)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="336" height="92" rx="18" class="white-card"/>
