<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="nav" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
      .muted-panel { fill: #f1f5f9; stroke: #e2e8f0; stroke-width: 1; }
      .text { fill: #0f172a; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #64748b; font-family: Inter, Arial, sans-serif; }
      .tiny { font-size: 18px; }
      .small { font-size: 22px; }
      .body { font-size: 26px; }
      .title { font-size: 34px; font-weight: 800; }
      .label { font-size: 19px; font-weight: 700; letter-spacing: .04em; }
      .bold { font-weight: 800; }
      .chip { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
      .green { fill: #ecfdf5; stroke: #a7f3d0; }
      .amber { fill: #fffbeb; stroke: #fde68a; }
      .rose { fill: #fff1f2; stroke: #fecdd3; }
      .bluechip { fill: #eff6ff; stroke: #bfdbfe; }
      .line { stroke: #e2e8f0; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="1000" fill="url(#nav)"/>
  <rect x="28" y="28" width="44" height="44" rx="12" fill="#2563eb"/>
  <text x="88" y="58" class="text" fill="#ffffff" font-size="24" font-weight="800">Promise</text>
  <text x="28" y="128" class="muted" fill="#94a3b8" font-size="16" font-weight="800">OPERATIONS</text>
  <rect x="18" y="164" width="184" height="48" rx="14" fill="#1e293b"/>
  <text x="54" y="196" class="text" fill="#e2e8f0" font-size="19" font-weight="700">Dashboard</text>
  <rect x="18" y="224" width="184" height="48" rx="14" fill="#2563eb"/>
  <text x="54" y="256" class="text" fill="#ffffff" font-size="19" font-weight="800">B2B Area</text>
  <rect x="18" y="284" width="184" height="48" rx="14" fill="#0f172a"/>
  <text x="54" y="316" class="text" fill="#cbd5e1" font-size="19" font-weight="700">Jobs</text>
  <rect x="18" y="344" width="184" height="48" rx="14" fill="#0f172a"/>
  <text x="54" y="376" class="text" fill="#cbd5e1" font-size="19" font-weight="700">Finance</text>

  <!-- Compact app header -->
  <rect x="220" y="0" width="1380" height="58" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="248" y="13" width="34" height="34" rx="10" fill="#f1f5f9"/>
  <text x="300" y="38" class="text" font-size="24" font-weight="800">B2B Workspace</text>
  <rect x="1290" y="13" width="70" height="32" rx="16" fill="#ecfdf5" stroke="#bbf7d0"/>
  <circle cx="1310" cy="29" r="5" fill="#10b981"/>
  <text x="1322" y="36" class="text" fill="#059669" font-size="14" font-weight="800">LIVE</text>
  <rect x="1375" y="11" width="36" height="36" rx="12" fill="#f1f5f9"/>
  <rect x="1423" y="11" width="36" height="36" rx="12" fill="#f1f5f9"/>
  <rect x="1471" y="11" width="36" height="36" rx="12" fill="url(#blue)"/>

  <!-- Workbench container -->
  <rect x="244" y="82" width="1332" height="884" rx="26" class="panel" filter="url(#shadow)"/>

  <!-- Left client rail -->
  <rect x="264" y="102" width="286" height="844" rx="22" fill="#0f172a"/>
  <text x="288" y="146" class="text" fill="#ffffff" font-size="28" font-weight="900">1000FIX</text>
  <text x="288" y="178" class="text" fill="#bfdbfe" font-size="17" font-weight="700">Limited Company / Corporate</text>

  <rect x="288" y="214" width="238" height="74" rx="16" fill="#172554"/>
  <text x="306" y="244" class="text" fill="#bfdbfe" font-size="16" font-weight="800">SERVICE WARRANTY</text>
  <text x="306" y="274" class="text" fill="#ffffff" font-size="26" font-weight="900">30 days</text>

  <rect x="288" y="304" width="238" height="74" rx="16" fill="#172554"/>
  <text x="306" y="334" class="text" fill="#bfdbfe" font-size="16" font-weight="800">BATCH CLEARANCE</text>
  <text x="306" y="364" class="text" fill="#ffffff" font-size="26" font-weight="900">7 working days</text>

  <rect x="288" y="394" width="238" height="74" rx="16" fill="#172554"/>
  <text x="306" y="424" class="text" fill="#bfdbfe" font-size="16" font-weight="800">PAYMENT TERMS</text>
  <text x="306" y="454" class="text" fill="#ffffff" font-size="26" font-weight="900">30 working days</text>

  <text x="288" y="512" class="text" fill="#cbd5e1" font-size="18" font-weight="800">Allowed work</text>
  <rect x="288" y="536" width="92" height="34" rx="17" fill="#1e293b"/>
  <text x="307" y="559" class="text" fill="#e2e8f0" font-size="15" font-weight="800">Full TV</text>
  <rect x="388" y="536" width="92" height="34" rx="17" fill="#1e293b"/>
  <text x="407" y="559" class="text" fill="#e2e8f0" font-size="15" font-weight="800">Panel</text>
  <rect x="288" y="582" width="104" height="34" rx="17" fill="#1e293b"/>
  <text x="307" y="605" class="text" fill="#e2e8f0" font-size="15" font-weight="800">CRR</text>
  <rect x="402" y="582" width="104" height="34" rx="17" fill="#1e293b"/>
  <text x="421" y="605" class="text" fill="#e2e8f0" font-size="15" font-weight="800">Parts</text>

  <rect x="288" y="666" width="238" height="84" rx="16" fill="#111827" stroke="#334155"/>
  <text x="306" y="698" class="text" fill="#ffffff" font-size="19" font-weight="900">Portal access</text>
  <text x="306" y="728" class="text" fill="#94a3b8" font-size="16">2 users active</text>
  <circle cx="496" cy="708" r="7" fill="#22c55e"/>

  <rect x="288" y="804" width="238" height="54" rx="16" fill="#2563eb"/>
  <text x="340" y="838" class="text" fill="#ffffff" font-size="20" font-weight="900">Edit Client Rules</text>

  <!-- Main action bar -->
  <rect x="574" y="102" width="982" height="74" rx="20" class="panel"/>
  <rect x="594" y="120" width="180" height="38" rx="13" fill="#10b981"/>
  <text x="626" y="146" class="text" fill="#ffffff" font-size="18" font-weight="900">Receive Work</text>
  <rect x="786" y="120" width="118" height="38" rx="13" class="chip"/>
  <text x="816" y="146" class="text" font-size="18" font-weight="800">Deliver</text>
  <rect x="916" y="120" width="154" height="38" rx="13" class="chip"/>
  <text x="944" y="146" class="text" font-size="18" font-weight="800">Generate Bill</text>
  <rect x="1082" y="120" width="170" height="38" rx="13" class="chip"/>
  <text x="1108" y="146" class="text" font-size="18" font-weight="800">Create CRR</text>
  <rect x="1280" y="120" width="252" height="38" rx="13" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="1302" y="146" class="muted" font-size="17">Search job, serial, bill...</text>

  <!-- Metric chips -->
  <rect x="574" y="192" width="982" height="62" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="594" y="207" width="116" height="32" rx="16" class="amber"/>
  <text x="612" y="230" class="text" fill="#b45309" font-size="16" font-weight="900">12 Pending</text>
  <rect x="720" y="207" width="96" height="32" rx="16" class="green"/>
  <text x="738" y="230" class="text" fill="#047857" font-size="16" font-weight="900">8 Ready</text>
  <rect x="826" y="207" width="124" height="32" rx="16" class="bluechip"/>
  <text x="844" y="230" class="text" fill="#1d4ed8" font-size="16" font-weight="900">22 Delivered</text>
  <rect x="960" y="207" width="142" height="32" rx="16" class="rose"/>
  <text x="978" y="230" class="text" fill="#be123c" font-size="16" font-weight="900">3 Batch Risk</text>
  <rect x="1112" y="207" width="144" height="32" rx="16" class="chip"/>
  <text x="1130" y="230" class="text" fill="#334155" font-size="16" font-weight="900">5 Bill Pending</text>
  <rect x="1266" y="207" width="168" height="32" rx="16" class="chip"/>
  <text x="1284" y="230" class="text" fill="#334155" font-size="16" font-weight="900">2 Extension Wait</text>

  <!-- Main table -->
  <rect x="574" y="274" width="700" height="672" rx="20" class="panel"/>
  <text x="602" y="318" class="text title">Work Items</text>
  <text x="602" y="350" class="muted small">Primary working area. Full list visible first.</text>

  <rect x="602" y="376" width="644" height="44" rx="12" fill="#f8fafc"/>
  <text x="624" y="405" class="muted label">JOB</text>
  <text x="780" y="405" class="muted label">DEVICE</text>
  <text x="982" y="405" class="muted label">STATUS</text>
  <text x="1118" y="405" class="muted label">BATCH</text>
  <line x1="602" y1="438" x2="1246" y2="438" class="line"/>

  <g>
    <rect x="602" y="456" width="644" height="66" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="624" y="488" class="text small bold">B2B-1048</text>
    <text x="780" y="488" class="text small">Samsung 43"</text>
    <rect x="982" y="466" width="98" height="30" rx="15" class="amber"/>
    <text x="1000" y="487" class="text" fill="#b45309" font-size="15" font-weight="900">Pending</text>
    <text x="1118" y="488" class="text small bold">Day 5/7</text>
    <text x="624" y="512" class="muted tiny">SN: 43AU7000-8821</text>
  </g>

  <g>
    <rect x="602" y="534" width="644" height="66" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="624" y="566" class="text small bold">B2B-1049</text>
    <text x="780" y="566" class="text small">Walton 32"</text>
    <rect x="982" y="544" width="78" height="30" rx="15" class="green"/>
    <text x="1001" y="565" class="text" fill="#047857" font-size="15" font-weight="900">Ready</text>
    <text x="1118" y="566" class="text small bold">Day 3/7</text>
    <text x="624" y="590" class="muted tiny">SN: W32-DH-1209</text>
  </g>

  <g>
    <rect x="602" y="612" width="644" height="66" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="624" y="644" class="text small bold">B2B-1050</text>
    <text x="780" y="644" class="text small">Sony 55"</text>
    <rect x="982" y="622" width="112" height="30" rx="15" class="bluechip"/>
    <text x="1000" y="643" class="text" fill="#1d4ed8" font-size="15" font-weight="900">Checking</text>
    <text x="1118" y="644" class="text small bold">Day 2/7</text>
    <text x="624" y="668" class="muted tiny">SN: XR55-8891</text>
  </g>

  <g>
    <rect x="602" y="690" width="644" height="66" rx="14" fill="#fff1f2" stroke="#fecdd3"/>
    <text x="624" y="722" class="text small bold">B2B-1051</text>
    <text x="780" y="722" class="text small">LG 50"</text>
    <rect x="982" y="700" width="66" height="30" rx="15" class="rose"/>
    <text x="1001" y="721" class="text" fill="#be123c" font-size="15" font-weight="900">NG</text>
    <text x="1118" y="722" class="text small bold">Overdue</text>
    <text x="624" y="746" class="muted tiny">Needs extension request</text>
  </g>

  <g>
    <rect x="602" y="768" width="644" height="66" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="624" y="800" class="text small bold">B2B-1052</text>
    <text x="780" y="800" class="text small">Panel Batch</text>
    <rect x="982" y="778" width="118" height="30" rx="15" class="chip"/>
    <text x="1000" y="799" class="text" fill="#334155" font-size="15" font-weight="900">Received</text>
    <text x="1118" y="800" class="text small bold">Day 1/7</text>
    <text x="624" y="824" class="muted tiny">Batch 47, item 5 of 10</text>
  </g>

  <!-- Right details panel -->
  <rect x="1296" y="274" width="240" height="672" rx="20" class="panel"/>
  <text x="1320" y="318" class="text" font-size="28" font-weight="900">Selected Item</text>
  <text x="1320" y="350" class="muted tiny">B2B-1048</text>
  <line x1="1320" y1="376" x2="1512" y2="376" class="line"/>

  <text x="1320" y="414" class="muted label">CURRENT STATUS</text>
  <rect x="1320" y="430" width="112" height="34" rx="17" class="amber"/>
  <text x="1341" y="453" class="text" fill="#b45309" font-size="16" font-weight="900">Pending</text>

  <text x="1320" y="510" class="muted label">CLIENT RULE</text>
  <text x="1320" y="542" class="text small bold">Clear by day 7</text>
  <text x="1320" y="570" class="muted tiny">Ask extension before delay</text>

  <text x="1320" y="626" class="muted label">QUICK ACTIONS</text>
  <rect x="1320" y="646" width="192" height="42" rx="13" fill="#2563eb"/>
  <text x="1352" y="674" class="text" fill="#ffffff" font-size="17" font-weight="900">Mark Checking</text>
  <rect x="1320" y="700" width="192" height="42" rx="13" class="chip"/>
  <text x="1360" y="728" class="text" font-size="17" font-weight="900">Declare OK</text>
  <rect x="1320" y="754" width="192" height="42" rx="13" class="chip"/>
  <text x="1356" y="782" class="text" font-size="17" font-weight="900">Declare NG</text>
  <rect x="1320" y="808" width="192" height="42" rx="13" class="rose"/>
  <text x="1340" y="836" class="text" fill="#be123c" font-size="17" font-weight="900">Request Extension</text>

  <text x="1320" y="900" class="muted tiny">No page jump. Details stay here.</text>
</svg>
