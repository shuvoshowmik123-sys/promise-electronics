<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Create Job - Step 3: Device</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f1117; color: #e4e4e7;
  max-width: 390px; margin: 0 auto; min-height: 100dvh;
  display: flex; flex-direction: column;
}
.top-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; position: sticky; top: 0; background: #0f1117; z-index: 10; }
.nav-back { width: 36px; height: 36px; border-radius: 10px; background: #1c1c24; border: 1px solid #27272a; display: flex; align-items: center; justify-content: center; color: #a1a1aa; }
.nav-title { font-size: 16px; font-weight: 600; color: #fff; }
.nav-step { font-size: 13px; color: #52525b; }
.progress-wrap { padding: 0 16px 20px; }
.progress-bar { height: 4px; background: #27272a; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; width: 50%; background: linear-gradient(90deg, #2563eb, #60a5fa); border-radius: 2px; }

.content { flex: 1; padding: 0 16px; overflow-y: auto; }
.section-title { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.section-subtitle { font-size: 14px; color: #71717a; margin-bottom: 24px; }

.form-group { margin-bottom: 20px; }
.form-label { font-size: 12px; font-weight: 600; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block; }
.form-input {
  width: 100%; padding: 14px 16px; background: #1c1c24;
  border: 1px solid #27272a; border-radius: 12px;
  color: #e4e4e7; font-size: 15px; outline: none; transition: border-color 0.2s;
}
.form-input:focus { border-color: #3b82f6; }
.form-input::placeholder { color: #3f3f46; }
textarea.form-input { min-height: 100px; resize: none; line-height: 1.5; }

/* Device Suggestions */
.suggestions {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px;
}
.suggestion-chip {
  padding: 6px 12px; border-radius: 8px;
  background: #27272a; border: 1px solid #3f3f46;
  font-size: 12px; color: #a1a1aa; cursor: pointer;
  transition: all 0.15s;
}
.suggestion-chip:active { background: #3f3f46; }

/* Screen Size Picker */
.size-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
}
.size-btn {
  padding: 10px 4px; border-radius: 10px;
  background: #1c1c24; border: 1px solid #27272a;
  color: #a1a1aa; font-size: 14px; font-weight: 500;
  text-align: center; cursor: pointer; transition: all 0.15s;
}
.size-btn:active { transform: scale(0.94); }
.size-btn.selected { background: #1e293b; border-color: #3b82f6; color: #60a5fa; font-weight: 600; }

/* AI Button */
.ai-suggest-btn {
  width: 100%; margin-top: 20px; padding: 14px;
  border-radius: 12px; background: #1c1c24;
  border: 1px dashed #3f3f46; color: #a1a1aa;
  font-size: 14px; font-weight: 500; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s;
}
.ai-suggest-btn:active { background: #27272a; border-color: #7c3aed; color: #a78bfa; }
.ai-sparkle { color: #a78bfa; }

.bottom-bar { padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom)); display: flex; gap: 10px; }
.back-btn { padding: 16px 20px; border-radius: 14px; background: #27272a; color: #a1a1aa; font-size: 15px; font-weight: 600; border: none; cursor: pointer; }
.next-btn { flex: 1; padding: 16px; border-radius: 14px; background: #2563eb; color: #fff; font-size: 16px; font-weight: 600; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.next-btn:active { transform: scale(0.97); }
</style>
</head>
<body>

<div class="top-nav">
  <div class="nav-back"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
  <span class="nav-title">New Job</span>
  <span class="nav-step">3 / 6</span>
</div>
<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill"></div></div></div>

<div class="content">
  <h1 class="section-title">Device Details</h1>
  <p class="section-subtitle">Describe the TV or device being repaired.</p>

  <div class="form-group">
    <label class="form-label">Device Name / Model</label>
    <input class="form-input" type="text" placeholder="e.g. Samsung UA55AU7700" value="">
    <div class="suggestions">
      <div class="suggestion-chip">Samsung 55" QLED</div>
      <div class="suggestion-chip">LG 43" WebOS</div>
      <div class="suggestion-chip">Sony Bravia 50"</div>
      <div class="suggestion-chip">Walton 32"</div>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Screen Size</label>
    <div class="size-grid">
      <div class="size-btn">24"</div>
      <div class="size-btn">32"</div>
      <div class="size-btn selected">43"</div>
      <div class="size-btn">50"</div>
      <div class="size-btn">55"</div>
      <div class="size-btn">60"</div>
      <div class="size-btn">65"</div>
      <div class="size-btn">75"</div>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Issue / Problem Description</label>
    <textarea class="form-input" placeholder="Describe what's wrong with the device...">No power — customer reports device shut off during storm and won't turn back on. Power LED not visible.</textarea>
  </div>

  <div class="form-group">
    <label class="form-label">Serial Number (optional)</label>
    <input class="form-input" type="text" placeholder="TV serial or model code">
  </div>

  <button class="ai-suggest-btn">
    <span class="ai-sparkle">✨</span>
    AI: Auto-fill from description
  </button>
</div>

<div class="bottom-bar">
  <button class="back-btn">Back</button>
  <button class="next-btn">Next: Parts <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
</div>

</body>
</html>
