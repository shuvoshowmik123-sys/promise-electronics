<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 300px;
      font-family: Arial, sans-serif;
      padding: 16px;
      background: #1a1a2e;
      color: #eee;
    }
    h2 { margin: 0 0 4px; font-size: 15px; color: #4fc3f7; }
    p  { margin: 0 0 12px; font-size: 11px; color: #aaa; }

    .btn {
      width: 100%; padding: 10px;
      border: none; border-radius: 6px;
      font-size: 13px; font-weight: bold;
      cursor: pointer; margin-bottom: 8px;
    }
    .btn-start  { background: #00c853; color: #000; }
    .btn-stop   { background: #e53935; color: #fff; display: none; }
    .btn-dl     { background: #1565c0; color: #fff; display: none; }

    #status {
      font-size: 12px;
      background: #111;
      border-radius: 6px;
      padding: 8px;
      min-height: 60px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #80cbc4;
    }
    .warn { color: #ffb300; font-size: 11px; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>Promise Chat Extractor</h2>
  <p>Extracts all inbox conversations — no prompts, fully automatic.</p>

  <button class="btn btn-start" id="btnStart">▶ Start Extraction (Auto)</button>
  <button class="btn btn-stop"  id="btnStop">⏹ Stop</button>
  <button class="btn btn-dl"   id="btnDownload">⬇ Download JSON</button>

  <div id="status">Ready. Open Meta Business Suite inbox first.</div>
  <div class="warn">⚠ Keep this tab open during extraction.</div>

  <script src="popup.js"></script>
</body>
</html>
